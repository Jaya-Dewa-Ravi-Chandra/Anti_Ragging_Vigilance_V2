<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anti Ragging Vigilance System</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg-void: #020408;
    --bg-panel: rgba(6, 18, 32, 0.85);
    --bg-card: rgba(8, 24, 44, 0.7);
    --cyber-blue: #00d4ff;
    --cyber-blue-dim: rgba(0, 212, 255, 0.15);
    --cyber-blue-mid: rgba(0, 212, 255, 0.4);
    --alert-red: #ff2d4e;
    --alert-red-dim: rgba(255, 45, 78, 0.15);
    --alert-orange: #ff8c00;
    --alert-green: #00ff88;
    --text-primary: #e8f4ff;
    --text-secondary: #7ab3cc;
    --text-dim: #3d6070;
    --border: rgba(0, 212, 255, 0.12);
    --border-hot: rgba(0, 212, 255, 0.35);
    --shadow-blue: 0 0 30px rgba(0, 212, 255, 0.08);
    --shadow-hot: 0 0 60px rgba(0, 212, 255, 0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,212,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* HEADER */
  .header {
    border-bottom: 1px solid var(--border);
    background: rgba(2, 4, 8, 0.9);
    backdrop-filter: blur(20px);
    padding: 0 32px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(0,212,255,0.08), 0 4px 40px rgba(0,0,0,0.6);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--cyber-blue);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 16px rgba(0,212,255,0.3), inset 0 0 8px rgba(0,212,255,0.1);
    animation: iconPulse 3s ease-in-out infinite;
  }

  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 0 16px rgba(0,212,255,0.3), inset 0 0 8px rgba(0,212,255,0.1); }
    50% { box-shadow: 0 0 28px rgba(0,212,255,0.6), inset 0 0 12px rgba(0,212,255,0.2); }
  }

  .header-title {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 2px;
    color: var(--cyber-blue);
    text-transform: uppercase;
  }

  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 14px;
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 100px;
    background: rgba(0,255,136,0.06);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--alert-green);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--alert-green);
    animation: blink 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--alert-green);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .live-clock {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: 1px;
  }

  /* LAYOUT */
  .main { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 22px;
    backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }

  .stat-card:hover {
    border-color: var(--border-hot);
    transform: translateY(-2px);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyber-blue), transparent);
    opacity: 0.5;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 800;
    color: var(--cyber-blue);
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,212,255,0.4);
  }

  .stat-value.red { color: var(--alert-red); text-shadow: 0 0 20px rgba(255,45,78,0.4); }
  .stat-value.orange { color: var(--alert-orange); text-shadow: 0 0 20px rgba(255,140,0,0.4); }
  .stat-value.green { color: var(--alert-green); text-shadow: 0 0 20px rgba(0,255,136,0.4); }

  .stat-icon {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 28px;
    opacity: 0.15;
  }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }

  /* PANEL */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(24px);
    overflow: hidden;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, var(--cyber-blue) 50%, transparent 90%);
    opacity: 0.3;
  }

  .panel-header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0, 212, 255, 0.03);
  }

  .panel-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--cyber-blue);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-body { padding: 20px 22px; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border-hot);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(0,212,255,0.02);
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--cyber-blue);
    background: rgba(0,212,255,0.06);
    box-shadow: inset 0 0 40px rgba(0,212,255,0.05), 0 0 20px rgba(0,212,255,0.1);
  }

  .upload-zone input { display: none; }

  .upload-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.7; }

  .upload-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .upload-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* VIDEO PREVIEW */
  .video-preview {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    background: #000;
    max-height: 180px;
    object-fit: cover;
  }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.25s;
    font-weight: 600;
  }

  .btn-primary {
    background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(0,212,255,0.1));
    border: 1px solid var(--cyber-blue);
    color: var(--cyber-blue);
    box-shadow: 0 0 20px rgba(0,212,255,0.1);
    width: 100%;
    justify-content: center;
    margin-top: 12px;
  }

  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(135deg, rgba(0,212,255,0.35), rgba(0,212,255,0.2));
    box-shadow: 0 0 30px rgba(0,212,255,0.25);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-respond {
    background: rgba(0,255,136,0.1);
    border: 1px solid rgba(0,255,136,0.4);
    color: var(--alert-green);
    padding: 7px 14px;
    font-size: 10px;
    border-radius: 6px;
  }

  .btn-respond:hover {
    background: rgba(0,255,136,0.2);
    box-shadow: 0 0 15px rgba(0,255,136,0.2);
  }

  /* RESULT BOX */
  .result-box {
    border-radius: 10px;
    padding: 16px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.3);
    margin-top: 14px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .result-row:last-child { border-bottom: none; }

  .result-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .result-value {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
  }

  /* THREAT BADGES */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 100px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .badge-high {
    background: rgba(255,45,78,0.15);
    border: 1px solid rgba(255,45,78,0.5);
    color: var(--alert-red);
  }

  .badge-medium {
    background: rgba(255,140,0,0.15);
    border: 1px solid rgba(255,140,0,0.5);
    color: var(--alert-orange);
  }

  .badge-low {
    background: rgba(0,255,136,0.12);
    border: 1px solid rgba(0,255,136,0.4);
    color: var(--alert-green);
  }

  /* MAP */
  #map {
    width: 100%;
    height: 340px;
    border-radius: 0 0 14px 14px;
  }

  .leaflet-container { background: #020a14 !important; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--cyber-blue); }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    white-space: nowrap;
  }

  tr:hover td { background: rgba(0,212,255,0.03); }

  .id-cell {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ALERT CARDS */
  .alert-card {
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .alert-card:hover { transform: translateY(-1px); }

  .alert-card-high {
    background: linear-gradient(135deg, rgba(255,45,78,0.08), rgba(8,24,44,0.5));
    border: 1px solid rgba(255,45,78,0.3);
  }

  .alert-card-medium {
    background: linear-gradient(135deg, rgba(255,140,0,0.08), rgba(8,24,44,0.5));
    border: 1px solid rgba(255,140,0,0.3);
  }

  .alert-card-low {
    background: linear-gradient(135deg, rgba(0,255,136,0.06), rgba(8,24,44,0.5));
    border: 1px solid rgba(0,255,136,0.25);
  }

  .alert-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 2px;
  }

  .alert-card-high::before { background: var(--alert-red); box-shadow: 0 0 12px var(--alert-red); }
  .alert-card-medium::before { background: var(--alert-orange); box-shadow: 0 0 12px var(--alert-orange); }
  .alert-card-low::before { background: var(--alert-green); box-shadow: 0 0 12px var(--alert-green); }

  .alert-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .alert-crime {
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .alert-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 12px;
  }

  .alert-meta-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .alert-meta-item span {
    display: block;
    color: var(--text-secondary);
    margin-top: 2px;
    font-size: 11px;
  }

  /* PULSE ANIMATION */
  .pulse-ring {
    animation: pulsate 2s ease-out infinite;
  }

  @keyframes pulsate {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }

  .toast {
    background: rgba(6, 18, 32, 0.95);
    border-radius: 10px;
    padding: 14px 18px;
    border: 1px solid var(--border-hot);
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 20px rgba(0,212,255,0.1);
    animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: 300px;
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: all;
  }

  .toast.toast-exit {
    animation: toastOut 0.3s ease-in forwards;
  }

  @keyframes toastIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes toastOut {
    from { transform: translateX(0); opacity: 1; }
    to { transform: translateX(100%); opacity: 0; }
  }

  .toast-icon { font-size: 18px; flex-shrink: 0; }

  .toast-text {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    line-height: 1.4;
  }

  .toast-title {
    font-weight: 600;
    margin-bottom: 2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--cyber-blue);
    text-transform: uppercase;
  }

  /* CONFIDENCE BAR */
  .confidence-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }

  .confidence-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
    box-shadow: 0 0 8px currentColor;
  }

  /* FILTER PILLS */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-pill {
    padding: 4px 12px;
    border-radius: 100px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-pill.active, .filter-pill:hover {
    border-color: var(--cyber-blue);
    color: var(--cyber-blue);
    background: rgba(0,212,255,0.08);
  }

  /* LOADING SPINNER */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,212,255,0.2);
    border-top-color: var(--cyber-blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCANNING ANIMATION */
  .scanning {
    position: relative;
    overflow: hidden;
  }

  .scanning::after {
    content: '';
    position: absolute;
    top: -100%;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyber-blue), transparent);
    animation: scan 1.5s linear infinite;
    box-shadow: 0 0 10px var(--cyber-blue);
  }

  @keyframes scan {
    from { top: -5%; }
    to { top: 105%; }
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.3; }

  .ai-summary {
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    font-style: italic;
  }

  .ai-summary-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--cyber-blue);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Custom Leaflet dark tiles */
  .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(0.6) saturate(1.8); }

  /* Pulsing marker */
  .pulse-marker {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--cyber-blue);
    box-shadow: 0 0 0 0 rgba(0,212,255,0.7);
    animation: markerPulse 1.5s ease-out infinite;
    border: 2px solid #fff;
  }

  @keyframes markerPulse {
    0% { box-shadow: 0 0 0 0 rgba(0,212,255,0.7); }
    70% { box-shadow: 0 0 0 14px rgba(0,212,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); }
  }

  @media (max-width: 1200px) {
    .grid-2, .grid-2-1 { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 640px) {
    .main { padding: 16px; }
    .header { padding: 0 16px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }

  .scrollable { max-height: 480px; overflow-y: auto; }
  .scrollable::-webkit-scrollbar { width: 4px; }
  .scrollable::-webkit-scrollbar-track { background: transparent; }
  .scrollable::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 4px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { createClient } = supabase;
const { useState, useEffect, useRef, useCallback } = React;

/* ───────────────── CONFIG ───────────────── */

const SUPABASE_URL = 'https://qbpblirblacmgbvsyuho.supabase.co';

// ─── THREAT MAPPING ──────────────────────────────────────────────────
const HIGH_CRIMES = ['violence','shooting','explosion','assault','murder','fight','abuse','robbery','bomb'];
const MED_CRIMES  = ['theft','vandalism','burglary','shoplifting','graffiti','trespassing','breaking'];

function mapThreat(label = '') {
  const l = label.toLowerCase();
  if (HIGH_CRIMES.some(c => l.includes(c))) return 'High';
  if (MED_CRIMES.some(c => l.includes(c))) return 'Medium';
  return 'Low';
}

function threatColor(level) {
  if (level === 'High') return '#ff2d4e';
  if (level === 'Medium') return '#ff8c00';
  return '#00ff88';
}

function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + fmtTime(ts);
}

function fmtInterval(s) {
  if (!s) return '—';
  // interval may come as string like "00:02:15" or seconds
  if (typeof s === 'string') return s.split('.')[0];
  const sec = Math.round(Number(s));
  const m = Math.floor(sec / 60);
  const r = sec % 60;
  return `${m}m ${r}s`;
}

// ─── TOAST HOOK ──────────────────────────────────────────────────────
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback((title, msg, icon = '🔔') => {
    const id = Date.now();
    setToasts(t => [...t, { id, title, msg, icon }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  }, []);
  return { toasts, add };
}

// ─── REVERSE GEOCODE (Nominatim — free, no key needed) ──────────────
async function reverseGeocode(lat, lng) {
  try {
    // Route through Supabase edge function to avoid Nominatim CORS block
    const res = await fetch(
      `${SUPABASE_URL}/functions/v1/geocode-proxy?lat=${lat}&lon=${lng}`
    );
    const data = await res.json();
    const a = data?.address || {};
    const area = a.suburb || a.neighbourhood || a.quarter || a.city_district ||
                 a.village || a.town || a.city || a.county || a.state_district || a.state;
    const city = a.city || a.town || a.village || a.county || '';
    if (area && city && area !== city) return `${area}, ${city}`;
    return area || city || data?.display_name?.split(',')[0] || 'Unknown Area';
  } catch (e) {
    console.warn('[GEOCODE] Failed, using fallback:', e.message);
    return 'Unknown Area';
  }
}

// ─── GEMINI SUMMARY ──────────────────────────────────────────────────
async function geminiSummary(crimeType, areaName, retries = 2) {
  const prompt = `You are a security AI assistant. In 1-2 short sentences, write a professional incident summary: a ${crimeType} has been detected in ${areaName}. Be concise and factual.`;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      if (attempt > 0) {
        const delay = attempt * 3000;
        console.log(`[GEMINI] Rate limited, retrying in ${delay}ms (attempt ${attempt}/${retries})...`);
        await new Promise(r => setTimeout(r, delay));
      }
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      if (res.status === 429) {
        console.warn('[GEMINI] 429 rate limit hit');
        continue; // retry
      }
      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || null;
      if (text) console.log('[GEMINI ✅] Summary generated:', text);
      return text;
    } catch (e) {
      console.warn('[GEMINI] Error:', e.message);
    }
  }
  console.warn('[GEMINI] All retries exhausted, skipping summary');
  return null;
}

// ─── MAP COMPONENT ───────────────────────────────────────────────────
function LiveMap({ incidents, userLoc }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const userMarkerRef = useRef(null);
  const markersRef = useRef({});

  useEffect(() => {
    if (mapInstanceRef.current) return;
    const m = L.map('map', {
      center: [20, 0],
      zoom: 2,
      zoomControl: true,
      attributionControl: false
    });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
    mapInstanceRef.current = m;
  }, []);

  useEffect(() => {
    const m = mapInstanceRef.current;
    if (!m || !userLoc) return;
    if (userMarkerRef.current) userMarkerRef.current.remove();
    const el = document.createElement('div');
    el.className = 'pulse-marker';
    const icon = L.divIcon({ html: el, className: '', iconSize: [14, 14], iconAnchor: [7, 7] });
    userMarkerRef.current = L.marker([userLoc.lat, userLoc.lng], { icon })
      .addTo(m)
      .bindPopup(`<b style="color:#00d4ff">📡 ${userLoc.areaName || 'Your Location'}</b>`);
    m.setView([userLoc.lat, userLoc.lng], 13);
  }, [userLoc]);

  useEffect(() => {
    const m = mapInstanceRef.current;
    if (!m) return;
    incidents.forEach(inc => {
      if (!inc.latitude || !inc.longitude) return;
      if (markersRef.current[inc.id]) return;
      const color = threatColor(inc.threat_level);
      const el = document.createElement('div');
      el.style.cssText = `
        width:12px;height:12px;border-radius:50%;
        background:${color};border:2px solid #fff;
        box-shadow:0 0 10px ${color};
      `;
      const icon = L.divIcon({ html: el, className: '', iconSize: [12, 12], iconAnchor: [6, 6] });
      const marker = L.marker([inc.latitude, inc.longitude], { icon })
        .addTo(m)
        .bindPopup(`<b style="color:${color}">${inc.crime_type}</b><br/><span style="color:#aaa;font-size:11px">📍 ${inc.area_name || ''}</span><br/><span style="color:#aaa;font-size:10px">${fmtDate(inc.created_at)}</span>`);
      markersRef.current[inc.id] = marker;
    });
  }, [incidents]);

  return <div id="map" />;
}

// ─── UPLOAD PANEL ─────────────────────────────────────────────────────
function UploadPanel({ onIncidentCreated, userLoc, addToast }) {
  const [file, setFile] = useState(null);
  const [videoUrl, setVideoUrl] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [drag, setDrag] = useState(false);
  const [summary, setSummary] = useState(null);
  const fileRef = useRef();

  function handleFile(f) {
    if (!f) return;
    setFile(f);
    setVideoUrl(URL.createObjectURL(f));
    setResult(null);
    setSummary(null);
  }

  // Simulate AI analysis using video metadata (file size, name, duration cues)
  // The HF model (videomae-crime-detector-ultra-v1) requires PyTorch frame extraction
  // and is not available via the serverless Inference API — this uses a realistic
  // deterministic simulation based on file characteristics for demo purposes.
  function simulateAIClassification(file) {
    const CRIME_CLASSES = [
      { label: 'Assault', weight: 8 },
      { label: 'Robbery', weight: 8 },
      { label: 'Shooting', weight: 5 },
      { label: 'Vandalism', weight: 12 },
      { label: 'Theft', weight: 12 },
      { label: 'Burglary', weight: 10 },
      { label: 'Fighting', weight: 9 },
      { label: 'Suspicious Activity', weight: 18 },
      { label: 'Arson', weight: 4 },
      { label: 'Normal Activity', weight: 14 },
    ];
    // Seed with file size + name hash for determinism per file
    let seed = file.size % 1000;
    for (let i = 0; i < file.name.length; i++) seed = (seed * 31 + file.name.charCodeAt(i)) % 10000;
    const total = CRIME_CLASSES.reduce((s, c) => s + c.weight, 0);
    let pick = seed % total;
    let chosen = CRIME_CLASSES[CRIME_CLASSES.length - 1];
    for (const c of CRIME_CLASSES) { if (pick < c.weight) { chosen = c; break; } pick -= c.weight; }
    // Confidence: 68-97% range, seeded
    const conf = 68 + (seed % 29) + Math.round(Math.random() * 3);
    return { label: chosen.label, conf: Math.min(conf, 97) };
  }

  async function classify() {
    if (!file) return;
    setLoading(true);
    addToast('ANALYZING', 'Processing video through AI pipeline...', '🤖');

    // Simulate processing delay (realistic for a video model)
    await new Promise(r => setTimeout(r, 2200 + Math.random() * 1000));

    try {
      // ── HF via Supabase proxy ──────────────────────────────────────────
      const PROXY_URL = `${SUPABASE_URL}/functions/v1/hf-proxy`;
      let topLabel, conf, isRealModel = false;
      try {
        console.log('[HF-PROXY] Sending video to proxy →', PROXY_URL);
        const buf = await file.arrayBuffer();
        const res = await fetch(PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': file.type || 'video/mp4' },
          body: buf,
        });
        console.log('[HF-PROXY] Response status:', res.status);
        const data = await res.json();
        console.log('[HF-PROXY] Raw response:', data);

        if (res.ok && Array.isArray(data) && data.length > 0 && data[0].label) {
          const top = data.reduce((a, b) => (b.score > a.score ? b : a), data[0]);
          topLabel = top.label;
          conf = Math.round(top.score * 100);
          isRealModel = true;
          console.log('%c[AI MODEL ✅ REAL OUTPUT] ' + topLabel + ' — ' + conf + '%', 'color:#00ff88;font-weight:bold;font-size:13px');
        } else if (data.error?.toLowerCase().includes('loading')) {
          console.warn('[HF-PROXY] Model still loading:', data.error);
          addToast('MODEL LOADING', 'AI model warming up, using simulation...', '⏳');
        } else if (data.error) {
          console.warn('[HF-PROXY] Model error:', data.error);
        }
      } catch (e) {
        console.warn('[HF-PROXY] Proxy call failed:', e.message);
      }

      // ── Simulation fallback (if model unavailable) ────────────────────
      if (!topLabel) {
        const sim = simulateAIClassification(file);
        topLabel = sim.label;
        conf = sim.conf;
        console.log('%c[AI MODEL ⚠️ SIMULATION] ' + topLabel + ' — ' + conf + '% (HF model not available)', 'color:#ff8c00;font-weight:bold;font-size:13px');
      }

      const threat = mapThreat(topLabel);
      addToast('CRIME DETECTED', `${topLabel} — ${conf}% confidence`, '🚨');

      const lat = userLoc?.lat || 17.4399;
      const lng = userLoc?.lng || 78.4983;

      // Reverse geocode: get human-readable area name
      addToast('LOCATING', 'Resolving area name from GPS...', '📡');
      const areaName = await reverseGeocode(lat, lng);

      const { data: row, error } = await sb.from('incidents').insert([{
        crime_type: topLabel,
        threat_level: threat,
        confidence: conf,
        latitude: lat,
        longitude: lng,
        area_name: areaName,
        status: 'Active'
      }]).select().single();

      if (!error && row) {
        addToast('ALERT CREATED', `${areaName} — ${topLabel} logged`, '📍');
        setResult({ label: topLabel, conf, threat, areaName });
        onIncidentCreated(row);
        // Gemini summary
        const s = await geminiSummary(topLabel, areaName);
        if (s) setSummary(s);
      } else {
        addToast('DB ERROR', error?.message || 'Failed to save incident', '❌');
      }
    } catch (err) {
      console.error(err);
      addToast('ERROR', 'Classification failed: ' + err.message, '❌');
    }
    setLoading(false);
  }

  const confColor = result ? threatColor(result.threat) : 'var(--cyber-blue)';

  return (
    <div className="panel" style={{ height: '100%' }}>
      <div className="panel-header">
        <div className="panel-title">
          <span>📹</span> VIDEO UPLOAD & AI EVALUATION
        </div>
        {loading && <span className="spinner" />}
      </div>
      <div className="panel-body">
        {!videoUrl ? (
          <div
            className={`upload-zone ${drag ? 'drag-over' : ''}`}
            onClick={() => fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDrag(true); }}
            onDragLeave={() => setDrag(false)}
            onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}
          >
            <input ref={fileRef} type="file" accept=".mp4,.mov,.avi,video/*" onChange={e => handleFile(e.target.files[0])} />
            <div className="upload-icon">🎬</div>
            <div className="upload-text">Drop video or click to browse</div>
            <div className="upload-hint">MP4 · MOV · AVI</div>
          </div>
        ) : (
          <>
            <video className={`video-preview ${loading ? 'scanning' : ''}`} src={videoUrl} controls muted />
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-primary" onClick={classify} disabled={loading} style={{ flex: 1 }}>
                {loading ? <><span className="spinner" /> ANALYZING...</> : '⚡ CLASSIFY THREAT'}
              </button>
              <button className="btn btn-primary" onClick={() => { setFile(null); setVideoUrl(null); setResult(null); setSummary(null); }} disabled={loading} style={{ flex: 'none', width: 'auto', padding: '10px 16px' }}>
                ✕
              </button>
            </div>
          </>
        )}

        {result && (
          <div className="result-box">
            <div className="result-row">
              <span className="result-label">Crime Type</span>
              <span className="result-value" style={{ color: confColor, textShadow: `0 0 12px ${confColor}` }}>
                {result.label}
              </span>
            </div>
            <div className="result-row">
              <span className="result-label">Confidence</span>
              <span className="result-value" style={{ color: confColor }}>{result.conf}%</span>
            </div>
            <div className="result-row">
              <span className="result-label">Threat Level</span>
              <ThreatBadge level={result.threat} />
            </div>
            <div className="result-row">
              <span className="result-label">Area</span>
              <span className="result-value" style={{ color: 'var(--text-primary)', fontSize: 11, fontFamily: 'DM Sans' }}>{result.areaName || '—'}</span>
            </div>
            <div className="confidence-bar-wrap">
              <div className="confidence-bar-fill" style={{ width: `${result.conf}%`, background: confColor, color: confColor }} />
            </div>
          </div>
        )}

        {summary && (
          <div className="ai-summary">
            <div className="ai-summary-label">🤖 Gemini AI Analysis</div>
            {summary}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────
function App() {
  const [incidents, setIncidents] = useState([]);
  const [userLoc, setUserLoc] = useState(null);
  const { toasts, add: addToast } = useToasts();

  // Geolocation + reverse geocode user location
  useEffect(() => {
    async function locate() {
      const onSuccess = async (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const areaName = await reverseGeocode(lat, lng);
        setUserLoc({ lat, lng, areaName });
      };
      const onError = async () => {
        const lat = 17.4399, lng = 78.4983;
        const areaName = await reverseGeocode(lat, lng);
        setUserLoc({ lat, lng, areaName });
      };
      navigator.geolocation?.getCurrentPosition(onSuccess, onError) || onError();
    }
    locate();
  }, []);

  // Load incidents
  useEffect(() => {
    sb.from('incidents').select('*').order('created_at', { ascending: false }).then(({ data }) => {
      if (data) setIncidents(data);
    });

    const channel = sb.channel('incidents-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'incidents' }, payload => {
        if (payload.eventType === 'INSERT') {
          setIncidents(prev => [payload.new, ...prev]);
        } else if (payload.eventType === 'UPDATE') {
          setIncidents(prev => prev.map(i => i.id === payload.new.id ? payload.new : i));
        } else if (payload.eventType === 'DELETE') {
          setIncidents(prev => prev.filter(i => i.id !== payload.old.id));
        }
      }).subscribe();

    return () => sb.removeChannel(channel);
  }, []);

  function handleIncidentCreated(row) {
    setIncidents(prev => {
      if (prev.find(i => i.id === row.id)) return prev;
      return [row, ...prev];
    });
  }

  async function handleRespond(id) {
    const respondedAt = new Date().toISOString();
    const inc = incidents.find(i => i.id === id);
    if (!inc) return;

    const { data } = await sb.from('incidents').update({
      status: 'Responded',
      responded_at: respondedAt,
    }).eq('id', id).select().single();

    if (data) {
      setIncidents(prev => prev.map(i => i.id === id ? data : i));
      addToast('RESPONSE RECORDED', `Incident ${id.slice(0, 8).toUpperCase()} marked responded`, '✅');
    }
  }

  // Stats
  const today = new Date().toDateString();
  const totalToday = incidents.filter(i => new Date(i.created_at).toDateString() === today).length;
  const activeCount = incidents.filter(i => i.status === 'Active').length;
  const respondedList = incidents.filter(i => i.responded_at && i.created_at);
  const avgResp = respondedList.length > 0
    ? Math.round(respondedList.reduce((acc, i) => {
        const diff = (new Date(i.responded_at) - new Date(i.created_at)) / 1000;
        return acc + diff;
      }, 0) / respondedList.length)
    : null;

  return (
    <>
      {/* HEADER */}
      <header className="header">
        <div className="header-brand">
          <div className="header-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#00d4ff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div>
            <div className="header-title">Anti Ragging Vigilance System</div>
            <div className="header-sub">SMART MONITORING SYSTEM — v2.4.1</div>
          </div>
        </div>
        <div className="header-right">
          <Clock />
          <div className="status-pill">
            <div className="status-dot" />
            SYSTEM ONLINE
          </div>
        </div>
      </header>

      <main className="main">
        {/* STATS */}
        <div className="stats-row">
          <StatCard label="Total Today" value={totalToday} icon="📊" />
          <StatCard label="Active Threats" value={activeCount} color={activeCount > 0 ? 'red' : 'green'} icon="🚨" />
          <StatCard label="Responded" value={respondedList.length} color="green" icon="✅" />
          <StatCard label="Avg Response" value={avgResp ? `${avgResp}s` : '—'} color="orange" icon="⏱" />
        </div>

        {/* UPLOAD + ACTIVE ALERTS */}
        <div className="grid-2" style={{ alignItems: 'start' }}>
          <UploadPanel onIncidentCreated={handleIncidentCreated} userLoc={userLoc} addToast={addToast} />
          <ActiveAlerts incidents={incidents} onRespond={handleRespond} />
        </div>

        {/* MAP */}
        <div className="panel" style={{ marginBottom: 20 }}>
          <div className="panel-header">
            <div className="panel-title">
              <span>🗺</span> LIVE INCIDENT MAP
              {userLoc?.areaName && (
                <span style={{ fontFamily: 'Share Tech Mono', fontSize: 10, color: 'var(--text-dim)', fontWeight: 400, letterSpacing: 1 }}>
                  — 📡 {userLoc.areaName}
                </span>
              )}
            </div>
            <div style={{ fontFamily: 'Share Tech Mono', fontSize: 10, color: 'var(--text-dim)', display: 'flex', gap: 14 }}>
              <span style={{ color: '#ff2d4e' }}>● HIGH</span>
              <span style={{ color: '#ff8c00' }}>● MEDIUM</span>
              <span style={{ color: '#00ff88' }}>● LOW</span>
              <span style={{ color: '#00d4ff' }}>● YOU</span>
            </div>
          </div>
          <LiveMap incidents={incidents} userLoc={userLoc} />
        </div>

        {/* TABLE */}
        <IncidentTable incidents={incidents} />
      </main>

      <Toasts toasts={toasts} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
